services:
  mysql:
    image: mysql:8.0
    container_name: mysql-db
    ports:
      - "3310:3306"
    environment:
      MYSQL_ROOT_PASSWORD: 123
      MYSQL_DATABASE: mydb
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p123"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - spring-network

  backend:
    build: ./backend-spring-security
    container_name: spring-api
    ports:
      - "8080:8080"
    environment:
      - spring.datasource.url=jdbc:mysql://mysql-db:3306/mydb
      - spring.datasource.username=root
      - spring.datasource.password=123
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GMAIL_USER=${GMAIL_USER}
      - GMAIL_APP_PASSWORD=${GMAIL_APP_PASSWORD}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - spring-network

  frontend:
    build: ./frontend
    container_name: react-app
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8080
    depends_on:
      - backend
    networks:
      - spring-network

networks:
  spring-network:
    driver: bridge